<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.site_title }} - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: {{ config.colors[config.theme].primary }};
            --secondary: {{ config.colors[config.theme].secondary }};
            --accent: {{ config.colors[config.theme].accent }};
            --bg: {{ config.colors[config.theme].background }};
            --card-bg: {{ config.colors[config.theme].card_bg }};
            --text: {{ config.colors[config.theme].text }};
            --danger: {{ config.colors[config.theme].danger }};
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            animation: blobFloat 8s ease-in-out infinite;
        }
        .blob-1 {
            width: 380px; height: 380px;
            background: var(--primary);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: var(--secondary);
            bottom: -80px; right: -80px;
            animation-delay: 4s;
        }
        .blob-3 {
            width: 200px; height: 200px;
            background: var(--accent);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
            opacity: 0.08;
        }

        @keyframes blobFloat {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(10px, -10px); }
        }

        /* Grid pattern */
        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 36px 32px 32px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 30px 60px -20px rgba(0,0,0,0.6);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glow line at top of card */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            border-radius: 4px;
        }

        /* Logo */
        .logo-wrap {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            margin: 0 auto 20px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.12),
                0 12px 28px -8px rgba(0,0,0,0.5);
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-wrap .fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #000;
        }

        /* Pulse ring on logo */
        .logo-ring {
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            z-index: -1;
            opacity: 0.5;
            animation: ringPulse 2.5s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-align: center;
            margin-top: 5px;
            color: var(--primary);
            opacity: 0.7;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 22px 0 18px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            animation: pulse 1.8s ease-in-out infinite;
            box-shadow: 0 0 10px var(--primary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--primary); }
            50% { opacity: 0.4; box-shadow: 0 0 2px var(--primary); }
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            opacity: 0.5;
        }

        /* Error */
        .error-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 60, 60, 0.08);
            border: 1px solid rgba(255, 60, 60, 0.3);
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--danger);
        }

        /* Label */
        label.field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 8px;
        }

        /* Input group */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            padding: 13px 46px 13px 16px;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input::placeholder {
            opacity: 0.3;
            letter-spacing: 0.1em;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary), 0.15),
                        0 0 20px -8px var(--primary);
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.35;
            transition: opacity 0.2s;
            color: var(--text);
            font-size: 15px;
        }

        .eye-btn:hover { opacity: 0.85; }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px -6px var(--primary);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            pointer-events: none;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px -6px var(--primary);
        }

        .btn-login:active { transform: translateY(0); }

        /* Footer */
        .footer {
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer img {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            object-fit: cover;
            opacity: 0.6;
        }

        .footer-text {
            font-size: 11px;
            opacity: 0.35;
            letter-spacing: 0.06em;
        }

        /* Corner badge */
        .corner-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0.4;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-bg"></div>
    <div class="corner-badge">{{ config.theme|upper }}</div>

    <div class="card">
        <!-- Logo -->
        <div class="relative" style="width:72px;margin:0 auto 20px;">
            <div class="logo-ring"></div>
            <div class="logo-wrap">
                <img src="/static/icon.png" alt="logo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="fallback" style="display:none">
                    <i class="fas fa-server"></i>
                </div>
            </div>
        </div>

        <h1>{{ config.site_header }}</h1>
        <p class="subtitle">SECURE CONTROL PANEL</p>

        <!-- Status -->
        <div class="status-bar">
            <span class="pulse-dot"></span>
            <span class="status-text">System online &mdash; Awaiting authentication</span>
        </div>

        {% if error %}
        <div class="error-box">
            <i class="fas fa-shield-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" id="loginForm">
            <label class="field-label" for="password">Access Key</label>
            <div class="input-group">
                <input type="password"
                       name="password"
                       id="password"
                       placeholder="••••••••••••"
                       required
                       autofocus>
                <i class="fas fa-eye eye-btn" id="toggleIcon" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-right-to-bracket" style="margin-right:8px;"></i>
                Authenticate
            </button>
        </form>

        <div class="footer">
            <img src="/static/icon.png" alt="logo" onerror="this.style.display='none'">
            <span class="footer-text">POWERED BY TEAM MHN &nbsp;|&nbsp; UNAUTHORIZED ACCESS PROHIBITED</span>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
